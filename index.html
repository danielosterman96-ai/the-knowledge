<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>The Logbook — Gilman Square</title>

<!-- Leaflet (free, open-source map library) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --ink: #1B1F23;
    --paper: #F7F4ED;
    --green: #2C4A3E;
    --rust: #B5482E;
    --pencil: #8B8478;
    --paper-shadow: #D8D2C2;
    --paper-card: #FBF9F4;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #EFEAE0;
    color: var(--ink);
  }

  #app {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--paper);
    position: relative;
    padding-bottom: 90px;
  }

  .top-bar {
    height: 6px;
    background: linear-gradient(90deg, var(--green), var(--rust));
  }

  .screen { padding: 24px 20px; }

  h1, h2 {
    font-family: Georgia, "Times New Roman", serif;
    margin: 0;
  }

  h1 { font-size: 28px; }
  h2 { font-size: 22px; line-height: 1.25; }

  .subtitle {
    color: var(--pencil);
    font-size: 14px;
    margin: 4px 0 20px;
  }

  .mono {
    font-family: "SF Mono", "Courier New", monospace;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--pencil);
    font-size: 14px;
    background: none;
    border: none;
    padding: 0;
    margin-bottom: 16px;
    cursor: pointer;
  }

  .primary-btn {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  .primary-btn:disabled { opacity: 0.3; cursor: default; }

  .secondary-btn {
    width: 100%;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--paper-shadow);
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .accent-btn {
    background: var(--green);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .divider-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 12px;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--pencil);
  }
  .divider-label .line { flex: 1; height: 1px; background: var(--paper-shadow); }

  .run-card {
    text-align: left;
    width: 100%;
    border: 1px solid var(--paper-shadow);
    background: var(--paper-card);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
    cursor: pointer;
  }

  .run-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .run-title { font-weight: 600; font-size: 15px; }

  .run-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--pencil);
    margin-bottom: 8px;

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 999px;
    border: 1px solid currentColor;

  .mastery-bar {
    height: 5px;

  #map {
    width: 100%;
    height: 280px;
    border-radius: 8px;
    border: 1px solid var(--paper-shadow);

  .point-card {
    background: var(--ink);

    padding: 18px;
    margin-bottom: 12px;

  .point-eyebrow {
    display: flex; align-items: center; gap: 6px;

    color: var(--paper-shadow); margin-bottom: 8px;
  }

    border: 2px solid var(--paper-shadow);
    border-top-color: var(--green);

  .tab-row {
    display: flex;

    margin-bottom: 16px;
    border-bottom: 1px solid var(--paper-shadow);
  }
  .tab-btn {
    background: none;
    border: none;
    padding: 8px 4px 10px;

    align-items: baseline;
    gap: 8px;
    margin-bottom: 14px;
  }

  }

<body>

<div id="app">
  <div class="top-bar"></div>
  <div id="screen" class="screen"></div>
</div>

<script>
// ===========================================================================
// THE LOGBOOK — live map edition
// Real Leaflet map + free OpenStreetMap tiles. No backend, no API key,
// no build step. Data lives in this file as a JS object.
//
// Coordinates: Gilman Square Station is verified (MBTA/OSM, 42.38794,
// -71.09679). Other landmark coordinates are approximated from published
// distance/bearing data and are NOT survey-precise — good enough for
// neighborhood-scale pins, not for anything requiring exact precision.
// The junction and playground coordinates are estimated placements pending
// real confirmation, consistent with this app's "verify by walking it"
// philosophy.
// ===========================================================================

const SEED_RUNS = [

        note: "Bridge carries School St over the old rail line, right by the west entrance." },
      { name: "Medford Street", lat: 42.38700, lng: -71.09600,
        note: "Head down Medford St toward the square — old commercial spine, brick buildings from the 1890s–1930s.",
        tip: { text: "Sidewalk's wider on the east side — easier with a stroller or bike.", author: "Dana R." } },
      { name: "Medford / Pearl / Marshall Junction", lat: 42.38660, lng: -71.09560,
        note: "Historic heart of Gilman Square — confirm current signal/crossing pattern in person.",
        approximate: true },
    ],
  },
  {
    id: "r2",
    neighborhoodId: "gilman-square",
    title: "The Square to City Hall",
    difficultyLevel: 2,
    difficultyLabel: "Landmark Pivot",
    author: "Seed",
    confirmations: 6,
    flags: 0,
    studied: true,
    mastery: 0.4,
    waypoints: [
      { name: "Medford / Pearl / Marshall Junction", lat: 42.38660, lng: -71.09560,
        note: "Start at the historic square.", approximate: true },
      { name: "Highland Avenue approach", lat: 42.38680, lng: -71.09700,
        note: "City Hall sits on Highland Ave — roughly 470 ft southwest of the T station as a straight-line distance." },
      { name: "Somerville City Hall", lat: 42.38703, lng: -71.09802,
        note: "93 Highland Ave. Built 1852, enlarged several times — look for the older brick core behind newer additions." },
    ],
  },
  {
    id: "r3",
    neighborhoodId: "gilman-square",
    title: "City Hall to Central Library",
    difficultyLevel: 2,
    difficultyLabel: "Landmark Pivot",
    author: "Seed",
    confirmations: 2,
    flags: 0,
    studied: false,
    mastery: 0,
    waypoints: [
      { name: "Somerville City Hall", lat: 42.38703, lng: -71.09802, note: "93 Highland Ave." },
      { name: "Highland Avenue", lat: 42.38650, lng: -71.09600,
        note: "Library and City Hall are both on Highland Ave, close together near Central Hill." },
      { name: "Central Library", lat: 42.38600, lng: -71.09417,
        note: "79 Highland Ave. Renaissance Revival brick building, built 1914 with Carnegie funding." },
    ],
  },
  {
    id: "r4",
    neighborhoodId: "gilman-square",
    title: "The Square to Marshall St Playground",
    difficultyLevel: 3,
    difficultyLabel: "Restricted Maze",
    author: "Priya K.",
    confirmations: 4,
    flags: 0,
    studied: true,
    mastery: 0.3,
    waypoints: [
      { name: "Medford / Pearl / Marshall Junction", lat: 42.38660, lng: -71.09560,
        note: "Start at the square.", approximate: true },
      { name: "Pearl Street", lat: 42.38640, lng: -71.09500,
        note: "Pearl St runs from Marshall St to James St — this stretch closes for the annual Gilman Square street festival.",
        tip: { text: "Closes for the street festival in late summer — check the date before relying on this run that week.", author: "Priya K." },
        restriction: { text: "Example restriction: no left turn from Pearl St onto Marshall St during this stretch.", verified: false } },
      { name: "Marshall Street", lat: 42.38600, lng: -71.09480,
        note: "Connects Pearl St to Broadway." },
      { name: "Marshall Street Playground", lat: 42.38560, lng: -71.09450,
        note: "Small neighborhood park between Pearl St and Broadway.", approximate: true },
    ],
  },
];

// ---------------------------------------------------------------------------
// Neighborhoods. Somerville has no single official neighborhood list — this
// combines commonly-cited sources (Wikipedia's neighborhood category, local
// real-estate/city-data guides) into one working set. Treat this as "commonly
// known squares/areas," not an authoritative city designation.
//
// Gilman Square's center is hand-verified (MBTA station coordinates). Every
// other neighborhood's center is fetched live via the same free geocoding
// service the "Add a run" feature already uses, then cached in localStorage
// so it's only fetched once per browser, not on every visit.
// ---------------------------------------------------------------------------

const NEIGHBORHOODS = [
  { id: "gilman-square", name: "Gilman Square", center: { lat: 42.38794, lng: -71.09679 }, verified: true },
  { id: "davis-square", name: "Davis Square" },
  { id: "union-square", name: "Union Square" },
  { id: "ball-square", name: "Ball Square" },
  { id: "magoun-square", name: "Magoun Square" },
  { id: "teele-square", name: "Teele Square" },
  { id: "powder-house-square", name: "Powder House Square" },
  { id: "porter-square", name: "Porter Square" },
  { id: "east-somerville", name: "East Somerville" },
  { id: "winter-hill", name: "Winter Hill" },
  { id: "assembly-square", name: "Assembly Square" },
  { id: "spring-hill", name: "Spring Hill" },
  { id: "central-hill", name: "Central Hill" },
  { id: "ten-hills", name: "Ten Hills" },
  { id: "prospect-hill", name: "Prospect Hill" },
  { id: "cobble-hill", name: "Cobble Hill" },
  { id: "brickbottom", name: "Brickbottom" },
  { id: "inner-belt", name: "Inner Belt District" },
];

const STORAGE_KEY_NEIGHBORHOOD_CENTERS = "logbook:neighborhoodCenters:v1";

function getNeighborhood(id) {
  return NEIGHBORHOODS.find(n => n.id === id);
}

function neighborhoodRuns(id) {
  return RUNS.filter(r => r.neighborhoodId === id);
}

function neighborhoodCoverage(id) {
  const runs = neighborhoodRuns(id);
  if (runs.length === 0) return { known: 0, total: 0, runCount: 0 };
  const knownRuns = runs.filter(r => r.mastery >= 0.7).length;
  return { known: knownRuns, total: runs.length, runCount: runs.length };
}

// Resolve (and cache) a real center point for a neighborhood that doesn't
// have a hand-verified one yet. Falls back to the Somerville city center if
// geocoding fails, so the map always renders something sensible.
async function resolveNeighborhoodCenter(neighborhood) {
  if (neighborhood.center) return neighborhood.center;

  const cache = loadJSON(STORAGE_KEY_NEIGHBORHOOD_CENTERS, {});
  if (cache[neighborhood.id]) return cache[neighborhood.id];

  try {
    const result = await geocode(`${neighborhood.name}, Somerville, MA`);
    const center = { lat: result.lat, lng: result.lng };
    cache[neighborhood.id] = center;
    saveJSON(STORAGE_KEY_NEIGHBORHOOD_CENTERS, cache);
    return center;
  } catch (e) {
    return { lat: 42.387959, lng: -71.103088 }; // Somerville city center, verified, as a safe fallback
  }
}

// ---------------------------------------------------------------------------
// Persistence — localStorage only, no backend, no account. Two things are
// saved separately from the seed content so future app updates (better
// coordinates, new seed runs, etc.) always come through cleanly:
//   1. progress on seed runs (studied / mastery), keyed by run id
//   2. runs created via "Add a run", saved in full
// localStorage can throw (private browsing, storage disabled, quota full),
// so every read/write is wrapped — a storage failure should never crash
// the app, just mean progress quietly isn't saved this session.
// ---------------------------------------------------------------------------

const STORAGE_KEY_PROGRESS = "logbook:progress:v1";
const STORAGE_KEY_USER_RUNS = "logbook:userRuns:v1";
let storageAvailable = true;

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    storageAvailable = false;
    return fallback;
  }
}

function saveJSON(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    storageAvailable = false;
  }
}

function saveProgress() {
  const progress = {};
  RUNS.forEach(r => {
    if (!r.id.startsWith("u")) progress[r.id] = { studied: r.studied, mastery: r.mastery };
  });
  saveJSON(STORAGE_KEY_PROGRESS, progress);
}

function saveUserRuns() {
  const userRuns = RUNS.filter(r => r.id.startsWith("u"));
  saveJSON(STORAGE_KEY_USER_RUNS, userRuns);
}

function buildInitialRuns() {
  const savedProgress = loadJSON(STORAGE_KEY_PROGRESS, {});
  const savedUserRuns = loadJSON(STORAGE_KEY_USER_RUNS, []);

  const seedWithProgress = SEED_RUNS.map(r => {
    const saved = savedProgress[r.id];
    return saved ? { ...r, studied: saved.studied, mastery: saved.mastery } : { ...r };
  });

  return [...seedWithProgress, ...savedUserRuns];
}

let RUNS = buildInitialRuns();

const CENTER = [42.38700, -71.09650];
let map = null;

// ---------------------------------------------------------------------------
// App state / router
// ---------------------------------------------------------------------------

let state = { screen: "neighborhoodPicker" };
const screenEl = document.getElementById("screen");

function go(newState) {
  state = newState;
  render();
}

function render() {
  if (map) { map.remove(); map = null; }
  if (state.screen === "neighborhoodPicker") renderNeighborhoodPicker();
  else if (state.screen === "logbook") renderLogbook();
  else if (state.screen === "study") renderStudy();
  else if (state.screen === "quizPicker") renderQuizPicker();
  else if (state.screen === "quiz") renderQuiz();
  else if (state.screen === "results") renderResults();
  else if (state.screen === "createRun") renderCreateRun();
}

function difficultyColor(level) {
  return level === 1 ? "#2C4A3E" : level === 2 ? "#8B8478" : level === 3 ? "#B5482E" : "#1B1F23";
}

function difficultyBadge(run) {
  const color = difficultyColor(run.difficultyLevel);
  return `<span class="badge" style="color:${color}">Lvl ${run.difficultyLevel} · ${run.difficultyLabel}</span>`;
}

// Coverage = how much of the street network appearing in a neighborhood's
// runs is well-known, not literally "% of that neighborhood" — there's no
// ground-truth total street count available without a much larger map
// dataset, so this stays honestly scoped to "streets that appear in the
// runs you/others have added for this neighborhood." A street counted once
// even if multiple runs touch it; its coverage level is the highest mastery
// among the runs that include it.
function coverageStats(neighborhoodId) {
  const streetMastery = new Map(); // street name -> highest mastery seen
  neighborhoodRuns(neighborhoodId).forEach(run => {
    run.waypoints.forEach(wp => {
      const key = wp.name;
      const prev = streetMastery.get(key) || 0;
      streetMastery.set(key, Math.max(prev, run.mastery));
    });
  });
  const total = streetMastery.size;
  const known = [...streetMastery.values()].filter(m => m >= 0.7).length;
  return { total, known, streetMastery };
}

function knownRunCount(neighborhoodId) {
  return neighborhoodRuns(neighborhoodId).filter(r => r.mastery >= 0.7).length;
}

// ---------------------------------------------------------------------------
// Neighborhood picker — City > Neighborhood. Only Somerville exists today,
// structured so a second city could be added later without a rewrite.
// ---------------------------------------------------------------------------

function renderNeighborhoodPicker() {
  screenEl.innerHTML = `
    <h1>The Logbook</h1>
    <p class="subtitle">Somerville, MA · pick a neighborhood to study</p>
    <p class="footnote" style="margin-top:-8px;">Somerville has no official neighborhood list — this is a commonly-used set of squares and areas, not a city designation.</p>
    <div class="divider-label"><div class="line"></div>Neighborhoods<div class="line"></div></div>
    <div id="neighborhoodList"></div>
  `;

  const list = document.getElementById("neighborhoodList");
  NEIGHBORHOODS.forEach(n => {
    const cov = neighborhoodCoverage(n.id);
    const card = document.createElement("button");
    card.className = "run-card";
    card.innerHTML = `
      <div class="run-card-top">
        <div class="run-title">${n.name}</div>
        ${cov.runCount === 0 ? `<span class="badge" style="color:var(--pencil);">no runs yet</span>` : ""}
      </div>
      ${cov.runCount > 0 ? `
        <div class="run-meta"><span>${cov.runCount} run${cov.runCount === 1 ? "" : "s"}</span><span>${cov.known} of ${cov.runCount} known cold</span></div>
        <div class="mastery-bar"><div class="mastery-fill" style="width:${(cov.known / cov.runCount) * 100}%"></div></div>
      ` : `<p style="font-size:12px; color:var(--pencil); margin:2px 0 0;">Be the first to add a run here.</p>`}
    `;
    card.onclick = () => go({ screen: "logbook", neighborhoodId: n.id });
    list.appendChild(card);
  });

// ---------------------------------------------------------------------------
// Call the Run — active recall quiz, with banned-turn aware distractors
// ---------------------------------------------------------------------------

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions(run) {
  const allNames = RUNS.flatMap(r => r.waypoints.map(w => w.name));
  const qs = [];
  for (let i = 0; i < run.waypoints.length - 1; i++) {
    const current = run.waypoints[i];
    const correct = run.waypoints[i + 1].name;
    const restriction = current.restriction;
    const bannedOption = restriction ? "Marshall Street" : null;
    const pool = allNames.filter(n => n !== correct && !run.waypoints.some(w => w.name === n) && n !== bannedOption);
    const distractorCount = bannedOption ? 1 : 2;
    const distractors = shuffle(pool).slice(0, distractorCount);
    const options = shuffle([correct, ...distractors, ...(bannedOption ? [bannedOption] : [])]);
    qs.push({ from: current.name, correct, options, restriction, bannedOption });
  }
  return qs;
}

function renderQuiz() {
  const run = RUNS.find(r => r.id === state.runId);
  if (!state.questions) state.questions = buildQuestions(run);
  const q = state.questions[state.qIndex];
  const isLast = state.qIndex === state.questions.length - 1;

  screenEl.innerHTML = `
    <button class="back-link" id="backBtn">‹ Logbook</button>
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span class="mono" style="font-size:11px; text-transform:uppercase; color:var(--pencil);">Calling the run</span>
      <span class="mono" style="font-size:11px; color:var(--pencil);">${state.qIndex + 1} / ${state.questions.length}</span>
    </div>
    <h2 style="margin-top:8px;">${run.title}</h2>
    <div style="margin:8px 0 12px;">${difficultyBadge(run)}</div>
    <div class="mastery-bar" style="margin-bottom:20px;"><div class="mastery-fill" style="width:${(state.qIndex / state.questions.length) * 100}%"></div></div>

    <div class="you-are-at">
      <div class="eyebrow">You are at</div>
      <div class="place">${q.from}</div>
      <div class="prompt">Where do you go next?</div>
    </div>

    <div class="quiz-options" id="options"></div>
    <div id="explain"></div>
    <div id="nextWrap" style="margin-top:16px;"></div>
  `;

  document.getElementById("backBtn").onclick = () => go({ screen: "logbook", neighborhoodId: run.neighborhoodId });

  const optionsEl = document.getElementById("options");
  let answered = false;

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "quiz-option";
    btn.innerHTML = `<span>${opt}</span>`;
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const isCorrect = opt === q.correct;
      const isBanned = opt === q.bannedOption;

      [...optionsEl.children].forEach(b => b.disabled = true);

      if (isCorrect) btn.classList.add("correct");
      else if (isBanned) btn.classList.add("banned");
      else btn.classList.add("wrong");

      [...optionsEl.children].forEach(b => {
        if (b !== btn && b.textContent.trim() !== q.correct) b.classList.add("faded");
        if (b.textContent.trim() === q.correct) b.classList.add("correct");
      });

      state.results = state.results || [];
      state.results.push(isCorrect);

      if (isBanned) {
        document.getElementById("explain").innerHTML = `
          <div class="restriction-box" style="margin-top:14px;">
            ⚠️ That's a restricted turn — ${q.restriction.text.replace("Example restriction: ", "")} You studied this one, remember?
          </div>`;
      }

      const nextWrap = document.getElementById("nextWrap");
      const nextBtn = document.createElement("button");
      nextBtn.className = "primary-btn";
      nextBtn.textContent = isLast ? "See results" : "Next point →";
      nextBtn.onclick = () => {
        if (isLast) {
          go({ screen: "results", runId: run.id, results: state.results });
        } else {
          go({ screen: "quiz", runId: run.id, qIndex: state.qIndex + 1, results: state.results, questions: state.questions });
        }
      };
      nextWrap.appendChild(nextBtn);
    };
    optionsEl.appendChild(btn);
  });
}

// ---------------------------------------------------------------------------
// Create a run — geocode two points (Nominatim) and fetch a real walking
// route between them (OSRM demo server), both free, no API key required.
// Both are public, donated infrastructure intended for light, end-user-
// triggered use (one person clicking "create," not automated bulk queries) —
// see Nominatim's usage policy and the OSRM demo server's usage policy.
// If either call fails or is unavailable, we show a clear error and leave
// the rest of the app untouched.
// ---------------------------------------------------------------------------

const LEVELS = [
  { level: 1, label: "Linear Artery" },
  { level: 2, label: "Landmark Pivot" },
  { level: 3, label: "Restricted Maze" },
  { level: 4, label: "Blind Cabbie" },
];

async function geocode(query) {
  // Bias results toward the Gilman Square / Somerville area so a plain
  // landmark name like "City Hall" resolves to the right one.
  const biasedQuery = `${query}, Somerville, MA`;
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(biasedQuery)}&limit=1`;
  let res;
  try {
    res = await fetch(url);
  } catch (e) {
    // fetch() throws "Failed to fetch" for network failures AND for CORS
    // rejections — the browser deliberately doesn't distinguish them for
    // security reasons. Both Nominatim and the OSRM demo server are free,
    // donated infrastructure and occasionally reject or time out in ways
    // that surface this way. Retrying in a few seconds often works.
    throw new Error(`Couldn't reach the map lookup service. This sometimes happens with these free map services under load — wait a few seconds and try again.`);
  }
  if (!res.ok) throw new Error(`Map lookup service returned an error (${res.status}). Try again in a moment.`);
  const data = await res.json();
  if (!data.length) throw new Error(`Couldn't find "${query}" on the map. Try a more specific name or address.`);
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), displayName: data[0].display_name };
}

async function fetchWalkingRoute(from, to) {
  // The public OSRM demo server's documented profiles are car/bike/foot,
  // but real-world reports suggest the public instance sometimes only
  // honors "driving" regardless of profile requested. We ask for "foot"
  // (correct per the docs) — if that profile isn't actually supported on
  // a given day, OSRM returns a route anyway (just optimized for driving),
  // so this still produces a usable, real street sequence either way.
  const url = `https://router.project-osrm.org/route/v1/foot/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson&steps=true`;
  let res;
  try {
    res = await fetch(url);
  } catch (e) {
    throw new Error(`Couldn't reach the routing service. This sometimes happens with this free routing service under load — wait a few seconds and try again.`);
  }
  if (!res.ok) throw new Error(`Routing service returned an error (${res.status}). Try again in a moment.`);
  const data = await res.json();
  if (data.code !== "Ok" || !data.routes || !data.routes.length) {
    throw new Error("Couldn't find a walking route between those two points.");
  }
  return data.routes[0];
}

// Collapse OSRM's step-by-step output into a manageable waypoint list —
// one entry per named street, not one per tiny segment.
function routeToWaypoints(route, fromLabel, toLabel) {
  const legs = route.legs || [];
  const steps = legs.flatMap(l => l.steps || []);
  const collapsed = [];
  steps.forEach(step => {
    const name = step.name && step.name.trim() ? step.name.trim() : null;
    const loc = step.maneuver && step.maneuver.location; // [lng, lat]
    if (!loc) return;
    const last = collapsed[collapsed.length - 1];
    if (name && last && last.name === name) return; // same street continuing, skip
    collapsed.push({ name: name || "Unnamed path", lat: loc[1], lng: loc[0] });
  });

  if (collapsed.length === 0) return null;
  collapsed[0].name = fromLabel;
  collapsed[collapsed.length - 1].name = toLabel;

  return collapsed.map(w => ({
    name: w.name,
    lat: w.lat,
    lng: w.lng,
    note: "No note added yet — walk this point and add what's worth knowing here.",
  }));
}

function renderCreateRun() {
  const neighborhood = getNeighborhood(state.neighborhoodId);

  screenEl.innerHTML = `
    <button class="back-link" id="backBtn">‹ ${neighborhood.name}</button>
    <h2>Add a run</h2>
    <p class="subtitle">${neighborhood.name} · Type two points. We'll fetch the real walking route between them — you fill in the local knowledge after.</p>

    <label class="field-label">Run name</label>
    <input class="text-input" id="titleInput" placeholder="e.g. The Square to the Library" />

    <label class="field-label">From</label>
    <input class="text-input" id="fromInput" placeholder="e.g. Gilman Square Station" />

    <label class="field-label">To</label>
    <input class="text-input" id="toInput" placeholder="e.g. Somerville City Hall" />

    <label class="field-label">Difficulty</label>
    <div class="level-picker" id="levelPicker"></div>

    <div id="statusArea"></div>

    <button class="primary-btn" id="createBtn">Find the route</button>
    <p class="footnote">Uses free OpenStreetMap services (Nominatim + OSRM). Occasionally slow or briefly unavailable since they run on donated infrastructure — if it fails, just try again in a moment.</p>
  `;

  document.getElementById("backBtn").onclick = () => go({ screen: "logbook", neighborhoodId: neighborhood.id });

  let selectedLevel = 1;
  const picker = document.getElementById("levelPicker");
  LEVELS.forEach(l => {
    const opt = document.createElement("button");
    opt.className = "level-option" + (l.level === selectedLevel ? " selected" : "");
    opt.innerHTML = `<div class="lvl-num">LVL ${l.level}</div><div class="lvl-name">${l.label}</div>`;
    opt.onclick = () => {
      selectedLevel = l.level;
      [...picker.children].forEach(c => c.classList.remove("selected"));
      opt.classList.add("selected");
    };
    picker.appendChild(opt);
  });

  document.getElementById("createBtn").onclick = async () => {
    const title = document.getElementById("titleInput").value.trim();
    const fromText = document.getElementById("fromInput").value.trim();
    const toText = document.getElementById("toInput").value.trim();
    const statusArea = document.getElementById("statusArea");
    const createBtn = document.getElementById("createBtn");

    if (!title || !fromText || !toText) {
      statusArea.innerHTML = `<div class="status-box error">Fill in a run name, a starting point, and a destination first.</div>`;
      return;
    }

    createBtn.disabled = true;
    statusArea.innerHTML = `<div class="status-box loading"><span class="spinner"></span>Looking up "${fromText}"…</div>`;

    try {
      const fromPoint = await geocode(fromText);
      statusArea.innerHTML = `<div class="status-box loading"><span class="spinner"></span>Looking up "${toText}"…</div>`;
      const toPoint = await geocode(toText);

      statusArea.innerHTML = `<div class="status-box loading"><span class="spinner"></span>Fetching the real walking route…</div>`;
      const route = await fetchWalkingRoute(fromPoint, toPoint);
      const waypoints = routeToWaypoints(route, fromText, toText);

      if (!waypoints || waypoints.length < 2) {
        throw new Error("Got a route back but couldn't make sense of it. Try slightly different start/end names.");
      }

      const newRun = {
        id: "u" + Date.now(),
        neighborhoodId: neighborhood.id,
        title,
        difficultyLevel: selectedLevel,
        difficultyLabel: LEVELS.find(l => l.level === selectedLevel).label,
        author: "You",
        confirmations: 0,
        flags: 0,
        studied: false,
        mastery: 0,
        waypoints,
      };

      RUNS.push(newRun);
      saveUserRuns();
      go({ screen: "study", runId: newRun.id, step: 0 });
    } catch (err) {
      statusArea.innerHTML = `<div class="status-box error">${err.message || "Something went wrong fetching that route. Try again in a moment."}</div>`;
      createBtn.disabled = false;
    }
  };
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------

render();
</script>
</body>
</html>
